databaseChangeLog:
  - changeSet:
      id: 004-seed-admin
      author: system
      preconditions:
        # Only run if the admin user with this email does not exist
        - not:
            - sqlCheck:
                expectedResult: "1"
                sql: "SELECT count(*) FROM customers WHERE email = 'admin@boutique.com'"
      changes:
        - comment: Insert initial admin user.
        - insert:
            tableName: customers
            columns:
              - column: {name: id, value: 'admin-seed-001'}
              - column: {name: email, value: 'admin@boutique.com'}
              - column: {name: password_hash, value: '$2a$10$tJ9fF2v9G1U4Y7Z0R3i.X0V5rB0q.K8s'} # Hashed value for 'password123'
              - column: {name: first_name, value: 'System'}
              - column: {name: last_name, value: 'Admin'}
              - column: {name: phone, value: '9999999999'}
              - column: {name: role, value: 'ADMIN'}