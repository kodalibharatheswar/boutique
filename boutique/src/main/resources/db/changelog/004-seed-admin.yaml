databaseChangeLog:
  - changeSet:
      id: 4
      author: boutique
      changes:
        - comment: Insert initial admin user.
        - insert:
            tableName: customers
            columns:
              - column: {name: id, value: 'admin-uuid-123'}
              - column: {name: email, value: 'admin@boutique.com'}
              - column: {name: password_hash, value: '$2a$10$...'} # **Must be a valid hashed password**
              - column: {name: first_name, value: 'System'}
              - column: {name: last_name, value: 'Admin'}
              - column: {name: role, value: 'ADMIN'}