databaseChangeLog:
  - changeSet:
      id: 001-create-customers
      author: system
      preconditions:
        # Prevents "Table 'customers' already exists" error on re-run
        - not:
            - tableExists:
                tableName: customers
      changes:
        - createTable:
            tableName: customers
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(100)
              - column:
                  name: last_name
                  type: varchar(100)
              - column:
                  name: phone
                  type: varchar(20)
              - column:
                  name: wallet_balance
                  type: decimal(12,2)
                  defaultValueNumeric: 0.00
              - column:
                  name: created_at
                  type: timestamp
              - column:
                  name: updated_at
                  type: timestamp
              - column:
                  name: role
                  type: VARCHAR(20)
                  defaultValue: CUSTOMER