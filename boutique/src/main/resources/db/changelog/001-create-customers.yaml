databaseChangeLog:
  - changeSet:
      id: 1
      author: boutique
      preconditions:
        # Skip this changeset if the 'customers' table already exists.
        # This fixes the "Table 'customers' already exists" error.
        - not:
            - tableExists:
                tableName: customers
      changes:
        - createTable:
            tableName: customers
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(50)
              - column:
                  name: last_name
                  type: VARCHAR(50)
              - column:
                  name: phone
                  type: VARCHAR(20)
              - column:
                  name: role
                  type: VARCHAR(20)
                  defaultValue: CUSTOMER