databaseChangeLog:
  - changeSet:
      id: 003-add-mainimage-to-products
      author: system
      preconditions:
        - not:
            - columnExists:
                tableName: products
                columnName: main_image
      changes:
        - addColumn:
            tableName: products
            columns:
              - column:
                  name: main_image
                  type: varchar(255)

  - changeSet:
      id: 003-add-filename-to-product-images
      author: system
      preconditions:
        - not:
            - columnExists:
                tableName: product_images
                columnName: file_name
      changes:
        - addColumn:
            tableName: product_images
            columns:
              - column:
                  name: file_name
                  type: varchar(255)