<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
  <h2>Edit Product</h2>

  <form method="post" enctype="multipart/form-data" th:action="@{/admin/products/edit}" th:object="${product}">
    <input type="hidden" th:field="*{id}"/>

    <div class="mb-3">
      <label>Name</label>
      <input type="text" class="form-control" th:field="*{name}" required/>
    </div>

    <div class="mb-3">
      <label>Description</label>
      <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
    </div>

    <div class="mb-3">
      <label>Price</label>
      <input type="number" step="0.01" class="form-control" th:field="*{price}" required/>
    </div>

    <div class="mb-3">
      <label>Stock</label>
      <input type="number" class="form-control" th:field="*{stock}" required/>
    </div>

    <div class="mb-3">
      <label>Category</label>
      <select class="form-select" th:field="*{category.id}">
        <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
      </select>
    </div>

    <div class="mb-3">
      <label>Upload New Images (optional)</label>
      <input type="file" class="form-control" name="images" multiple/>
    </div>

    <!-- show existing -->
    <div class="mb-3">
      <label>Existing Images</label>
      <div class="d-flex flex-wrap">
        <img th:each="img : ${product.images}"
             th:src="@{'/images/products/' + ${img.fileName}}"
             style="width:120px;height:120px;object-fit:cover;margin-right:8px;"
        />
      </div>
    </div>

    <button class="btn btn-success">Update</button>
    <a class="btn btn-secondary" th:href="@{/admin/products}">Cancel</a>
  </form>
</div>
</body>
</html>
