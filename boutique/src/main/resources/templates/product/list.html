<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
  <h2>Products</h2>
  <div class="row mt-3">
    <div class="col-md-3 mb-4" th:each="p : ${products}">
      <div class="card">
        <img th:src="${p.mainImage != null ? '/images/products/' + p.mainImage : '/images/products/noimage.png'}"
             class="card-img-top" style="height:180px;object-fit:cover;"/>
        <div class="card-body">
          <h5 th:text="${p.name}"></h5>
          <p class="text-success">₹ <span th:text="${p.price}"></span></p>
          <a th:href="@{'/products/' + ${p.id}}" class="btn btn-primary btn-sm">View</a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
