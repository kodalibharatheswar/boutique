<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="${product.name}">Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
  <div class="row">
    <div class="col-md-6">
      <!-- show carousel of images if multiple -->
      <div th:if="${product.images != null and #lists.size(product.images) > 0}">
        <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-inner">
            <div th:each="img, iterStat : ${product.images}"
                 th:classappend="${iterStat.index == 0} ? ' active' : ''"
                 class="carousel-item">
              <img th:src="@{'/images/products/' + ${img.fileName}}" class="d-block w-100" style="height:400px; object-fit:cover;">
            </div>
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>
      </div>
      <div th:if="${product.images == null || #lists.size(product.images) == 0}">
        <img src="/images/products/noimage.png" class="img-fluid" style="height:400px;object-fit:cover"/>
      </div>
    </div>

    <div class="col-md-6">
      <h2 th:text="${product.name}"></h2>
      <h4 class="text-success">₹ <span th:text="${product.price}"></span></h4>
      <p th:text="${product.description}"></p>
      <p><strong>Stock:</strong> <span th:text="${product.stock}"></span></p>

      <a class="btn btn-success">Add to Cart</a>
      <a class="btn btn-outline-danger">Add to Wishlist</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
