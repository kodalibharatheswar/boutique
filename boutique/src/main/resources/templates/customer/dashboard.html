<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Customer Dashboard - Boutique</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Boutique</a>
    <div>
      <span class="text-white me-3">Welcome, <span th:text="${customer.firstName}">User</span>!</span>
      <a class="btn btn-danger btn-sm" th:href="@{/logout}">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2>Available Products</h2>
  <hr>

  <div class="row mt-4">
    <div class="col-md-3 mb-4" th:each="p : ${products}">
      <div class="card shadow h-100">
        <img th:src="${p.mainImage != null ? '/images/products/' + p.mainImage : '/images/products/noimage.png'}"
             class="card-img-top"
             style="height:200px;object-fit:cover;"
             alt="Product">

        <div class="card-body d-flex flex-column">
          <h5 class="card-title" th:text="${p.name}">Product Name</h5>
          <p class="text-muted small mb-2" th:text="${p.category != null ? p.category.name : 'Uncategorized'}"></p>
          <p class="card-text text-success fw-bold">
            ₹ <span th:text="${p.price}">0.00</span>
          </p>
          <p class="card-text text-muted small">
            Stock: <span th:text="${p.stock}">0</span>
          </p>

          <div class="mt-auto">
            <a th:href="@{'/products/' + ${p.id}}" class="btn btn-primary btn-sm w-100 mb-2">View Details</a>
            <div class="btn-group w-100" role="group">
              <button class="btn btn-warning btn-sm" disabled>Wishlist</button>
              <button class="btn btn-success btn-sm" disabled>Add to Cart</button>
            </div>
            <small class="text-muted d-block mt-1 text-center">(Coming Soon)</small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(products)}" class="alert alert-info">
    No products available at the moment.
  </div>
</div>

</body>
</html>
