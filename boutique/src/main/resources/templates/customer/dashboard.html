<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Customer Dashboard - Boutique</title>

  <!-- Bootstrap -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">

    <a class="navbar-brand">Boutique</a>

    <div>
      <a class="btn btn-danger" th:href="@{/logout}">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-5">

  <h2>Welcome, <span th:text="${customer.firstName}">User</span>!</h2>
  <hr>

  <h4>Available Products</h4>

  <div class="row mt-4">

    <div class="col-md-3 mb-4" th:each="p : ${products}">
      <div class="card shadow">

        <img th:src="@{'/uploads/' + ${p.image}}" class="card-img-top" alt="Product">

        <div class="card-body">
          <h5 class="card-title" th:text="${p.name}"></h5>
          <p class="card-text">
            ₹ <span th:text="${p.price}"></span>
          </p>

          <a th:href="@{'/products/' + ${p.id}}" class="btn btn-primary btn-sm">View</a>
          <a th:href="@{'/wishlist/add/' + ${p.id}}" class="btn btn-warning btn-sm">Wishlist</a>
          <a th:href="@{'/cart/add/' + ${p.id}}" class="btn btn-success btn-sm">Add to Cart</a>
        </div>

      </div>
    </div>

  </div>

</div>

</body>
</html>
