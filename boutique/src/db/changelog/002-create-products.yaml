databaseChangeLog:
  - changeSet:
      id: create-product-category
      author: bharath
      changes:
        - createTable:
            tableName: product_categories
            columns:
              - column:
                  name: id
                  type: BIGINT AUTO_INCREMENT
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

  - changeSet:
      id: create-products
      author: bharath
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT AUTO_INCREMENT
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(200)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: price
                  type: DECIMAL(10,2)
              - column:
                  name: stock
                  type: INT
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_product_category
                    references: product_categories(id)

  - changeSet:
      id: create-product-images
      author: bharath
      changes:
        - createTable:
            tableName: product_images
            columns:
              - column:
                  name: id
                  type: BIGINT AUTO_INCREMENT
                  constraints:
                    primaryKey: true
              - column:
                  name: image_url
                  type: VARCHAR(255)
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_product_image
                    references: products(id)
